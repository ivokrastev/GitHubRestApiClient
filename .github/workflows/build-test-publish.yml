name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
        packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.x
      env:
        NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build -c Release
      
    - name: Test
      run: ./TestApp/bin/Release/net8.0/TestApp ${{ github.repository_owner }} ${{ github.event.repository.name }} ${{ secrets.GITHUB_TOKEN }}
      
    - name: Generate a NuGet package
      run: dotnet pack ./GitHubRestApiClient/GitHubRestApiClient.csproj --no-build -c Release -o .
      
    - name: Setup authentication for the NuGet repository
      run: dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/ivokrastev/index.json"
      
    - name: Push to GitHub package registry
      run: dotnet nuget push GitHubRestApiClient.*.nupkg --source "github" --api-key ${{ secrets.GITHUB_TOKEN }}
